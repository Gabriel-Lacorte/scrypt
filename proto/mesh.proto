syntax = "proto3";

package scrypt.mesh;

/// A task submitted for distributed analysis.
message AnalysisTask {
    string task_id = 1;
    /// Reference to PCAP data (path or inline bytes)
    bytes pcap_chunk = 2;
    /// Dissector configuration
    string filter_expression = 3;
    /// Maximum dissection depth
    uint32 max_depth = 4;
}

/// Result of analyzing a chunk.
message AnalysisResult {
    string task_id = 1;
    /// Number of packets analyzed
    uint64 packet_count = 2;
    /// Protocol statistics (JSON-encoded)
    string stats_json = 3;
    /// Completion status
    bool success = 4;
    string error_message = 5;
}

/// Peer node information.
message PeerInfo {
    string node_id = 1;
    string address = 2;
    uint64 available_cores = 3;
    uint64 memory_mb = 4;
}

message JoinRequest {
    PeerInfo peer = 1;
}

message JoinResponse {
    bool accepted = 1;
    repeated PeerInfo known_peers = 2;
}

message HeartbeatRequest {
    string node_id = 1;
    uint64 current_tasks = 2;
}

message HeartbeatResponse {
    bool acknowledged = 1;
}

message TaskRequest {
    AnalysisTask task = 1;
}

message TaskResponse {
    bool accepted = 1;
    string task_id = 2;
}

message ResultRequest {
    string task_id = 1;
}

/// The mesh analysis service.
service MeshService {
    rpc JoinMesh (JoinRequest) returns (JoinResponse);
    rpc Heartbeat (HeartbeatRequest) returns (HeartbeatResponse);
    rpc SubmitTask (TaskRequest) returns (TaskResponse);
    rpc GetResults (ResultRequest) returns (AnalysisResult);
}
